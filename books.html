    <style>
        /* General Typography based on original */
        html, button, input, select, textarea,
        .pure-g [class *= "pure-u"] {
            font-weight: 300;
            font-family: 'Helvetica Neue', 'Source Sans Pro', 'Open Sans', Helvetica, Arial, sans-serif;
            font-size: 15px;
            line-height: 1.4em;
        }

        h2 {
            font-weight: 300;
            line-height: 1.2em;
            margin-top: 0.5em; /* Adjusted for spacing */
            margin-bottom: 1em; /* Adjusted for spacing */
        }

        p {
            margin: 1em 0 1em;
        }

        /* Book Specific Styling (Copied directly from original) */
        .book, .book img, .book::after,
        .book::before {
            border-top-right-radius: 5px;
            border-bottom-right-radius: 5px;
        }

        body {
            background: #fde3a7; /* Keeping original background */
            text-align: center;
            margin-left: 1em;
            margin-right: 1em;
            padding-top: 20px; /* Add some padding at the top */
        }

        ul {
             /* Original had table-cell, changing to block and using flexbox for centering */
             /* display: table-cell;
             vertical-align: middle; */
             display: flex;
             flex-wrap: wrap; /* Allow items to wrap to the next line */
             justify-content: center; /* Center items horizontally */
             padding: 0; /* Remove default ul padding */
             list-style: none; /* Remove list bullets */
        }

        .list-inline > li {
            /* Keep display inline-block but add margin for spacing */
            display: inline-block; /* Preserve for list-inline class */
            margin: 0.5em; /* Added margin around each book item */
            vertical-align: top; /* Align items nicely in grid */
        }

         .list-inline > li:first-child {
            /* Remove the specific first-child margin rule as general margin is added */
            margin-left: 0.5em; /* Keep consistent margin */
        }

        .book {
            cursor: pointer;
            display: block; /* Ensure block behavior */
            width: 150px; /* Match original book size */
            height: 220px; /* Match original book size */
            position: relative;
            background: white;
            z-index: 1;
            box-shadow: 0 2px 4px 0 rgba(0, 0, 0, 0.1), 0 9px 20px 0 rgba(0, 0, 0, 0.25);
            overflow: hidden;
            -webkit-transition: box-shadow .3s linear;
            transition: box-shadow .3s linear;
        }

        /* Link styling - often reset by Normalize or Pure */
        a {
            text-decoration: none; /* Remove underline from links */
            color: inherit; /* Inherit color from parent */
            display: block; /* Make the entire book div clickable */
            width: 100%;
            height: 100%;
        }

        .book img {
            width: 150px;
            height: 220px;
            display: block; /* Prevent extra space below image */
            -webkit-transform-origin: 0 50%;
            transform-origin: 0 50%;
            -webkit-transform: rotateY(0);
            transform: rotateY(0);
            -webkit-transition: all .45s ease;
            transition: all .45s ease;
        }

        .book:hover {
            box-shadow: 0 2px 4px 0 rgba(0, 0, 0, 0.25), 0 9px 20px 0 rgba(0, 0, 0, 0.45);
        }
        .book:hover img {
            -webkit-transform: rotateY(-25deg);
            transform: rotateY(-25deg);
            box-shadow: 1px 1px 5px 5px rgba(0, 0, 0, 0.2);
        }

        .book::after,
        .book::before {
            content: '';
            display: block;
            width: inherit;
            height: inherit;
            position: absolute;
            z-index: -1;
            top: 0;
            background: white;
            border: 1px solid #d9d9d9;
        }

        .book::before {
            left: -3px;
        }

        .book::after {
            left: -6px;
        }
    </style>
</head>
